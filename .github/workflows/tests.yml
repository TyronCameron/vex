name: Tests

on:
  pull_request:

jobs:
  test:
    name: Unit + E2E tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LuaJIT
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "luajit-2.1"

      - name: Install LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install busted
        run: luarocks install busted

      - name: Install luacov
        run: luarocks install luacov

      - name: Ensure vex binary is executable
        run: chmod +x src/vex

      - name: Run unit tests
        run: |
          repo="$(pwd)"
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          (cd "$tmp" && "$repo/src/vex" init)
          (cd "$tmp" && busted --helper="$repo/test/unit/load.lua" --config-file="$repo/.busted" "$repo/test/unit")

      - name: Run e2e tests
        run: busted --run=e2e
